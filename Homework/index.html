<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">   
</head>
<style>
    .btn-primary {
        background-color: #00ff1e;
        border-color: #000408;
        
    }
</style>
<body>
    <button type="button" class="btn btn-primary">Click</button>
    <button type="button" class="btn btn-secondary">Click</button>
    <button type="button" class="btn btn-success">Click</button>    
    <button type="button" class="btn btn-danger">Click</button>
    <button type="button" class="btn btn-warning">Click</button> 
    <button type="button" class="btn btn-info">Click</button>
    <button type="button" class="btn btn-light">Click</button>  
    <button type="button" class="btn btn-dark">Click</button>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
</body>
</html>
