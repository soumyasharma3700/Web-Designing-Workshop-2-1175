<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styled Bootstrap Page</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }

    header {
      background: linear-gradient(to right, #0d6efd, #6610f2);
    }

    header h1 {
      font-weight: bold;
      letter-spacing: 1px;
    }

    .content-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      transition: transform 0.3s ease;
    }

    .content-box:hover {
      transform: translateY(-5px);
    }

    .btn-custom {
      border-radius: 25px;
      padding: 8px 20px;
    }

    footer {
      font-size: 14px;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>

  
  <header class="text-white text-center py-4">
    <h1>My Website</h1>
    <p class="lead">Styled with Bootstrap </p>
  </header>


  <nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">MySite</a>

      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>


  <div class="container my-5">
    <div class="row">

      
      <div class="col-12 col-md-6">
        <div class="content-box">
          <h3>About Us</h3>
          <p>This section has a card-like design using custom CSS.</p>
          <button class="btn btn-primary btn-custom">Learn More</button>
        </div>
      </div>

      
      <div class="col-12 col-md-6">
        <div class="content-box">
          <h3>Services</h3>
          <p>We provide web design and development services.</p>
          <button class="btn btn-outline-primary btn-custom">View Services</button>
        </div>
      </div>

    </div>
  </div>

  
  <footer class="bg-dark text-white text-center py-3">
    <p>&copy; 2026 MySite | Made with Bootstrap</p>
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
